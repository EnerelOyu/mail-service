name: Deploy Mail Service

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Copy JAR to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.MAIL_SERVICE_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/mail-service-0.0.1-SNAPSHOT.jar"
          target: "/root/"
          strip_components: 1

      - name: Restart Service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MAIL_SERVICE_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: systemctl restart mail-service
